<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>JUMP 聊天室 — 即時匿名聊天</title>
  <meta name="description" content="JUMP 即時匿名聊天室：支援貼圖、圖片與 GIF 分享、超連結，並可查看目前在線上的成員。">

  <!-- Styling -->
  <link rel="stylesheet" href="assets/css/style.css?v=2.0.0">
</head>
<body>

  <div class="app-container">
    <!-- Header -->
    <header>
      <div class="brand-section">
        <h1>JUMP 聊天室</h1>
        <p>即時匿名聊天・貼圖・圖片・GIF</p>
      </div>

      <!-- User Status, Nickname & Online Users -->
      <div class="user-status-panel">
        <div class="user-avatar-dot"></div>
        <span id="nickname-display">匿名訪客</span>
        <button type="button" id="online-btn" aria-haspopup="true" aria-expanded="false" hidden></button>
        <button id="change-nickname-btn" aria-label="修改暱稱">修改</button>

        <div id="online-popover" hidden>
          <div class="online-popover-title">🟢 在線上的人</div>
          <ul id="online-list"></ul>
        </div>
      </div>
    </header>

    <!-- Chat Room -->
    <main class="main-content">
      <section class="panel chat-panel" aria-label="即時聊天室">

        <!-- Messages Board -->
        <div class="chat-messages" id="chat-messages" role="log" aria-live="polite">
          <!-- Dynamic Chat Bubbles Rendered via chat.js -->
        </div>

        <!-- Composer -->
        <form class="chat-input-bar" id="chat-form" autocomplete="off">

          <!-- Emoji / Sticker Popover -->
          <div id="composer-popover" hidden>
            <div class="composer-tabs" role="tablist">
              <button type="button" class="composer-tab active" data-tab="emoji">😊 表情</button>
              <button type="button" class="composer-tab" data-tab="sticker">🧩 貼圖</button>
            </div>
            <div class="emoji-grid" id="emoji-grid"></div>
            <div class="sticker-grid" id="sticker-grid" hidden></div>
          </div>

          <button type="button" class="composer-btn" id="emoji-btn" title="插入表情" aria-label="插入表情">😊</button>
          <button type="button" class="composer-btn" id="sticker-btn" title="傳送貼圖" aria-label="傳送貼圖">🧩</button>
          <label class="composer-btn" for="image-input" id="image-btn" title="傳送圖片或 GIF" aria-label="傳送圖片或 GIF">🖼️</label>
          <input type="file" id="image-input" accept="image/png,image/jpeg,image/gif,image/webp" hidden>

          <textarea
            id="chat-input"
            placeholder="輸入訊息...（Enter 送出）"
            rows="1"
            maxlength="500"
            aria-label="訊息內容"
          ></textarea>
          <button type="submit" id="send-btn">送出</button>
        </form>
      </section>
    </main>
  </div>

  <!-- Nickname Entry Dialog (Modal Overlay) -->
  <div class="modal-overlay" id="nickname-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <button class="modal-close-x" id="nickname-close-btn" aria-label="關閉視窗">&times;</button>
      <h2 id="modal-title">設定您的暱稱</h2>
      <p>請輸入一個在聊天室中顯示的名稱（1-20 字元）</p>

      <form id="nickname-form">
        <input
          type="text"
          id="nickname-input"
          placeholder="例如：小明"
          maxlength="20"
          required
        >
        <button type="submit">確定</button>
      </form>
    </div>
  </div>

  <!-- Image Lightbox -->
  <div class="modal-overlay" id="lightbox-overlay" role="dialog" aria-modal="true" aria-label="圖片預覽">
    <figure class="lightbox-content">
      <button class="modal-close-x" id="lightbox-close-btn" aria-label="關閉圖片">&times;</button>
      <img id="lightbox-image" src="" alt="圖片預覽">
      <a id="lightbox-open-link" href="#" target="_blank" rel="noopener noreferrer">在新分頁開啟 ↗</a>
    </figure>
  </div>

  <!-- JavaScript Modules -->
  <script src="assets/js/config.js?v=2.0.0"></script>
  <script src="assets/js/emoji.js?v=2.0.0"></script>
  <script src="assets/js/api.js?v=2.0.0"></script>
  <script src="assets/js/chat.js?v=2.0.0"></script>
</body>
</html>
