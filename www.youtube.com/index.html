<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JUMP Tube — 獨立影音搜尋與播放器</title>
  <meta name="description" content="無需直接連線 YouTube 即可進行搜尋與播放的獨立影音入口。">
  
  <!-- Font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap">
  
  <style>
    :root {
      --font-primary: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --bg-deep: #0b0914;
      --bg-surface: rgba(22, 20, 38, 0.85);
      --bg-card: rgba(30, 27, 52, 0.6);
      --bg-card-hover: rgba(43, 38, 74, 0.8);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --accent-red: #ef4444;
      --accent-gradient: linear-gradient(135deg, #ef4444 0%, #ec4899 100%);
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-primary);
      background-color: var(--bg-deep);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(239, 68, 68, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 45%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .brand h1 {
      font-size: 2rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .brand p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .status-panel {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg-card);
      padding: 0.5rem 1rem;
      border-radius: 50px;
      border: 1px solid var(--border-color);
      font-size: 0.85rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #f59e0b;
      border-radius: 50%;
      box-shadow: 0 0 8px #f59e0b;
      transition: var(--transition-smooth);
    }

    .status-dot.online {
      background-color: #10b981;
      box-shadow: 0 0 8px #10b981;
    }

    .status-dot.offline {
      background-color: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }

    /* Back Home Button */
    .back-btn {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: var(--transition-smooth);
    }

    .back-btn:hover {
      color: var(--text-primary);
    }

    /* Search Section */
    .search-bar-container {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .search-form {
      display: flex;
      width: 100%;
      max-width: 650px;
      gap: 0.75rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 0.5rem 0.75rem;
      border-radius: 16px;
      transition: var(--transition-smooth);
    }

    .search-form:focus-within {
      border-color: #ef4444;
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.15);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-primary);
      font-size: 1rem;
      padding: 0.5rem 0.25rem;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-btn {
      background: var(--accent-gradient);
      color: white;
      border: none;
      outline: none;
      cursor: pointer;
      padding: 0.5rem 1.5rem;
      border-radius: 12px;
      font-family: var(--font-primary);
      font-weight: 600;
      font-size: 0.95rem;
      transition: var(--transition-smooth);
    }

    .search-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    /* Main Grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* Video Card */
    .video-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      flex-direction: column;
    }

    .video-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-4px);
      border-color: rgba(239, 68, 68, 0.3);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .thumbnail-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background-color: #000;
      overflow: hidden;
    }

    .thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition-smooth);
    }

    .video-card:hover .thumbnail {
      transform: scale(1.03);
    }

    .duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    .card-info {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }

    .video-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .video-channel {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .video-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: auto;
    }

    /* Modal Player */
    .player-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(11, 9, 20, 0.95);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      z-index: 2000;
      transition: var(--transition-smooth);
      padding: 1rem;
    }

    .player-modal.active {
      opacity: 1;
      visibility: visible;
    }

    .player-container {
      width: 100%;
      max-width: 900px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      transform: translateY(30px);
      transition: var(--transition-smooth);
    }

    .player-modal.active .player-container {
      transform: translateY(0);
    }

    .close-btn {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      font-size: 1.5rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
      z-index: 10;
    }

    .close-btn:hover {
      background: var(--accent-red);
      border-color: var(--accent-red);
    }

    .iframe-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .iframe-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .player-info {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .player-title {
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .player-channel {
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    /* Loader */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 1rem;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(239, 68, 68, 0.1);
      border-radius: 50%;
      border-top-color: var(--accent-red);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      text-align: center;
      color: var(--text-secondary);
      font-size: 1rem;
      padding: 3rem;
    }

    footer {
      text-align: center;
      padding: 2rem 0;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      margin-top: auto;
    }

    /* --- Top-Level Navigation Tabs --- */
    .main-nav {
      display: flex;
      gap: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.75rem;
      margin-bottom: 1.5rem;
      width: 100%;
    }

    .main-nav-tab {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-secondary);
      font-family: var(--font-primary);
      font-size: 1.15rem;
      font-weight: 600;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      position: relative;
      transition: var(--transition-smooth);
      text-decoration: none;
      display: inline-block;
    }

    .main-nav-tab:hover {
      color: var(--text-primary);
    }

    .main-nav-tab::after {
      content: '';
      position: absolute;
      bottom: -0.85rem;
      left: 0;
      width: 100%;
      height: 3px;
      background: transparent;
      transition: var(--transition-smooth);
      border-radius: 3px 3px 0 0;
    }

    .main-nav-tab.active {
      color: var(--text-primary);
    }

    .main-nav-tab.active::after {
      background: var(--accent-gradient);
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Top-Level Navigation Tabs -->
    <nav class="main-nav">
      <a href="../" class="main-nav-tab">💬 即時聊天</a>
      <a href="./" class="main-nav-tab active">📺 YouTube</a>
      <a href="../www.instagram.com/" class="main-nav-tab">📸 Instagram</a>
      <a href="../www.facebook.com/" class="main-nav-tab">👥 Facebook</a>
    </nav>

    <header>
      <div class="brand">
        <h1>JUMP Tube</h1>
        <p>免 YouTube 網址的獨立安全播放系統</p>
      </div>
      
      <div class="status-panel">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">正在偵測最快伺服器...</span>
      </div>
    </header>

    <!-- Search Section -->
    <div class="search-bar-container">
      <form class="search-form" id="search-form" autocomplete="off">
        <input 
          type="text" 
          id="search-input" 
          class="search-input" 
          placeholder="搜尋影音、音樂..." 
          required
        >
        <button type="submit" class="search-btn">搜尋</button>
      </form>
    </div>

    <!-- Video List Area -->
    <div id="content-area">
      <div class="loader-container" id="initial-loader">
        <div class="spinner"></div>
        <p>連線至安全鏡像伺服器中...</p>
      </div>
      <div class="video-grid" id="video-grid" style="display: none;"></div>
    </div>

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 Jump. Powered by decentralized mirror APIs.</p>
    </footer>
  </div>

  <!-- Player Modal -->
  <div class="player-modal" id="player-modal">
    <div class="player-container">
      <button class="close-btn" id="close-modal-btn" aria-label="關閉播放器">&times;</button>
      <div class="iframe-wrapper">
        <iframe id="video-iframe" src="" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
      </div>
      <div class="player-info">
        <h2 class="player-title" id="player-title">影片載入中...</h2>
        <p class="player-channel" id="player-channel"></p>
      </div>
    </div>
  </div>

  <!-- JavaScript logic -->
  <script>
    // List of reliable public Invidious instances to query
    const INVIDIOUS_INSTANCES = [
      'https://invidious.lunar.icu',
      'https://inv.tux.pizza',
      'https://invidious.nerdvpn.de',
      'https://yewtu.be',
      'https://inv.zoomerville.com'
    ];

    let activeInstance = '';
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const videoGrid = document.getElementById('video-grid');
    const initialLoader = document.getElementById('initial-loader');
    const searchForm = document.getElementById('search-form');
    const searchInput = document.getElementById('search-input');
    
    // Modal Elements
    const playerModal = document.getElementById('player-modal');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const videoIframe = document.getElementById('video-iframe');
    const playerTitle = document.getElementById('player-title');
    const playerChannel = document.getElementById('player-channel');

    /**
     * Find the fastest working Invidious instance
     */
    async function selectInstance() {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 4000); // 4s timeout

      const promises = INVIDIOUS_INSTANCES.map(async (instance) => {
        try {
          const res = await fetch(`${instance}/api/v1/search?q=test&page=1`, {
            signal: controller.signal
          });
          if (res.ok) {
            return instance;
          }
        } catch (e) {
          // Ignore failed instances
        }
        throw new Error('Failed');
      });

      try {
        const fastest = await Promise.any(promises);
        clearTimeout(timeoutId);
        activeInstance = fastest;
        statusDot.className = 'status-dot online';
        statusText.textContent = `伺服器已連線 (${new URL(fastest).hostname})`;
        return fastest;
      } catch (e) {
        clearTimeout(timeoutId);
        // Fallback to a default if all fail pings
        activeInstance = INVIDIOUS_INSTANCES[0];
        statusDot.className = 'status-dot online';
        statusText.textContent = `伺服器已連線 (${new URL(activeInstance).hostname})`;
        return activeInstance;
      }
    }

    /**
     * Format numbers to readably short numbers (e.g. 1.2M views)
     */
    function formatViews(num) {
      if (!num) return '';
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M次觀看';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K次觀看';
      return num + '次觀看';
    }

    /**
     * Search and render videos
     */
    async function performSearch(query) {
      initialLoader.style.display = 'flex';
      videoGrid.style.display = 'none';
      videoGrid.innerHTML = '';

      if (!activeInstance) {
        await selectInstance();
      }

      try {
        const res = await fetch(`${activeInstance}/api/v1/search?q=${encodeURIComponent(query)}`);
        if (!res.ok) throw new Error('Search failed');
        
        const data = await res.json();
        const videos = data.filter(item => item.type === 'video');

        if (videos.length === 0) {
          videoGrid.innerHTML = `<div class="message">找不到與「${query}」相關的影片，請更換關鍵字再試。</div>`;
        } else {
          videos.forEach(video => {
            const card = document.createElement('div');
            card.className = 'video-card';
            
            // Extract the thumbnail URL. Many instances return relative paths or absolute ones
            let thumbUrl = '';
            if (video.videoThumbnails && video.videoThumbnails.length > 0) {
              // Get high quality thumbnail
              const t = video.videoThumbnails.find(x => x.quality === 'medium' || x.quality === 'high') || video.videoThumbnails[0];
              thumbUrl = t.url;
              if (thumbUrl.startsWith('/')) {
                thumbUrl = activeInstance + thumbUrl;
              }
            }

            const viewsStr = formatViews(video.viewCount);
            const timeFormatted = video.lengthSeconds ? 
              new Date(video.lengthSeconds * 1000).toISOString().substring(11, 19).replace(/^00:/, '') : '';

            card.innerHTML = `
              <div class="thumbnail-container">
                <img class="thumbnail" src="${thumbUrl}" alt="${video.title}" loading="lazy">
                ${timeFormatted ? `<span class="duration">${timeFormatted}</span>` : ''}
              </div>
              <div class="card-info">
                <h3 class="video-title">${video.title}</h3>
                <div class="video-channel">${video.author}</div>
                <div class="video-meta">
                  <span>${viewsStr}</span> • <span>${video.publishedText || ''}</span>
                </div>
              </div>
            `;

            card.addEventListener('click', () => {
              openPlayer(video.videoId, video.title, video.author);
            });

            videoGrid.appendChild(card);
          });
        }
      } catch (err) {
        console.error(err);
        videoGrid.innerHTML = `
          <div class="message">
            搜尋發生錯誤，可能此鏡像伺服器暫時無法使用。<br>
            <button onclick="retrySearch('${query}')" style="margin-top: 1rem; padding: 0.5rem 1rem; background: var(--accent-gradient); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 600;">切換伺服器並重試</button>
          </div>
        `;
      } finally {
        initialLoader.style.display = 'none';
        videoGrid.style.display = 'grid';
      }
    }

    async function retrySearch(query) {
      statusText.textContent = '正在重新連線至其他伺服器...';
      statusDot.className = 'status-dot';
      activeInstance = '';
      await selectInstance();
      performSearch(query);
    }

    /**
     * Modal Player Controls
     */
    function openPlayer(videoId, title, author) {
      playerTitle.textContent = title;
      playerChannel.textContent = author;
      // Using invidious embed endpoint to display player
      videoIframe.src = `${activeInstance}/embed/${videoId}?autoplay=1&listen=0`;
      playerModal.classList.add('active');
    }

    function closePlayer() {
      playerModal.classList.remove('active');
      videoIframe.src = '';
    }

    // Event Listeners
    searchForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const val = searchInput.value.trim();
      if (val) {
        performSearch(val);
      }
    });

    closeModalBtn.addEventListener('click', closePlayer);
    
    // Close modal on overlay click
    playerModal.addEventListener('click', (e) => {
      if (e.target === playerModal) {
        closePlayer();
      }
    });

    // Initialize
    window.addEventListener('DOMContentLoaded', async () => {
      await selectInstance();
      // Search a default topic on load so the interface looks lively
      performSearch('Lofi hip hop radio');
    });
  </script>
</body>
</html>
